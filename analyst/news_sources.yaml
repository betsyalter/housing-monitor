# News source quality tiers for Script 14 dispatch.
# Wyatt-owned config (analyst/ domain). Update as we observe what FMP serves.
#
# Score adjustment applied to each article:
#   trusted: +2  (high-trust journalism + official sources)
#   normal:   0  (decent but not authoritative)
#   penalty: -2  (aggregators, listicles, low signal)
#   exclude: drop entirely before scoring (pure SEO / clickbait)
#
# Match by `site` field (preferred — domain) or `publisher` field (fallback).
# Match is substring/case-insensitive: "bloomberg.com" in "www.bloomberg.com" → trusted.
#
# Last updated: 2026-05-01

trusted:
  # General financial / news of record
  - bloomberg.com
  - reuters.com
  - wsj.com
  - ft.com
  - nytimes.com
  - washingtonpost.com
  - sec.gov
  # Federal agencies & official sources
  - federalreserve.gov
  - fhfa.gov
  - hud.gov
  - treasury.gov
  - whitehouse.gov
  - congress.gov
  - nar.realtor
  # DC trade press — where housing/policy scuttlebutt breaks BEFORE Bloomberg
  - politico.com         # promoted from normal — DC-first reporting
  - politicopro.com
  - punchbowl.news       # subscription DC newsletter, often has the early-breaks
  - rollcall.com
  - thehill.com          # promoted from normal
  # Real estate trade press
  - housingwire.com      # real estate / mortgage industry trade
  - inman.com            # real estate trade
  - realtormag.realtor   # NAR's own magazine — leading indicator on NAR positioning
  - mba.org              # Mortgage Bankers Association
  - nahb.org             # National Association of Home Builders
  # Company press release wires
  - businesswire.com
  - prnewswire.com

normal:
  - marketwatch.com
  - cnbc.com
  - barrons.com
  - bnnbloomberg.ca
  - axios.com
  - benzinga.com         # debatable — has IR distribution + trader-blog content
  - bizjournals.com      # local biz journals; useful for regional housing
  - investing.com
  - finance.yahoo.com

penalty:
  - zacks.com
  - fool.com             # Motley Fool
  - seekingalpha.com
  - investorplace.com
  - tipranks.com
  - marketbeat.com
  - insidermonkey.com
  - thestreet.com
  - 247wallst.com

exclude:
  - smartreads.com
  - simplywall.st
  - finbold.com
  - investorobserver.com
  - amigobulls.com
